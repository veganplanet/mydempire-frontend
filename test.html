<!DOCTYPE html>
<html>
<head>
  <title>Factory Upgrade Test</title>
</head>
<body>
  <h2>Factory Upgrade Test</h2>

  <label>Username:</label><br>
  <input id="username" value=""><br><br>

  <label>Factory ID:</label><br>
  <input id="factoryid" value=""><br><br>

  <button onclick="upgradeFactory()">Upgrade Factory</button>

  <h3>Result:</h3>
  <pre id="result"></pre>

  <script>
    async function upgradeFactory() {
      const username = document.getElementById("username").value.trim();
      const factory_id = parseInt(document.getElementById("factoryid").value, 10);

      try {
        const res = await fetch("http://localhost:10000/factory/upgrade", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username,
            factory_id
          })
        });

        const text = await res.text();
        document.getElementById("result").innerText = text;
      } catch (err) {
        document.getElementById("result").innerText = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
