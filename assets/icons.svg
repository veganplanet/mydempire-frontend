<svg xmlns="http://www.w3.org/2000/svg">

  <!-- Land -->
  <symbol id="icon-land" viewBox="0 0 24 24">
    <rect x="3" y="3" width="7" height="7" />
    <rect x="14" y="3" width="7" height="7" />
    <rect x="3" y="14" width="7" height="7" />
    <rect x="14" y="14" width="7" height="7" />
  </symbol>

  <!-- Blueprint -->
  <symbol id="icon-blueprint" viewBox="0 0 24 24">
    <rect x="4" y="4" width="16" height="16" />
    <line x1="8" y1="8" x2="16" y2="8" />
    <line x1="8" y1="12" x2="16" y2="12" />
    <line x1="8" y1="16" x2="13" y2="16" />
  </symbol>

  <!-- Factory -->
  <symbol id="icon-factory" viewBox="0 0 24 24">
    <rect x="3" y="10" width="6" height="10" />
    <rect x="10" y="6" width="6" height="14" />
    <rect x="17" y="12" width="4" height="8" />
  </symbol>

  <!-- Maintenance -->
  <symbol id="icon-maintenance" viewBox="0 0 24 24">
    <path d="M21 7a5 5 0 0 1-6 6L7 21l-4-4 8-8a5 5 0 0 1 6-6" />
  </symbol>

  <!-- Upgrade -->
  <symbol id="icon-upgrade" viewBox="0 0 24 24">
    <line x1="12" y1="19" x2="12" y2="5" />
    <polyline points="6 11 12 5 18 11" />
  </symbol>

  <!-- Reward -->
  <symbol id="icon-reward" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="8" />
    <line x1="12" y1="8" x2="12" y2="16" />
    <line x1="9" y1="12" x2="15" y2="12" />
  </symbol>

  <!-- EMP -->
  <symbol id="icon-emp" viewBox="0 0 24 24">
    <polygon points="12,2 20,7 20,17 12,22 4,17 4,7" />
  </symbol>

  <!-- EP -->
  <symbol id="icon-ep" viewBox="0 0 24 24">
    <polygon points="13 2 3 14 11 14 9 22 21 8 13 8" />
  </symbol>

  <!-- Relic -->
  <symbol id="icon-relic" viewBox="0 0 24 24">
    <polygon points="12,3 18,10 12,21 6,10" />
  </symbol>

  <!-- Writ -->
  <symbol id="icon-writ" viewBox="0 0 24 24">
    <rect x="6" y="4" width="12" height="16" />
    <line x1="9" y1="8" x2="15" y2="8" />
    <line x1="9" y1="12" x2="15" y2="12" />
  </symbol>

  <!-- Shop -->
  <symbol id="icon-shop" viewBox="0 0 24 24">
    <rect x="3" y="7" width="18" height="14" />
    <line x1="3" y1="7" x2="12" y2="2" />
    <line x1="21" y1="7" x2="12" y2="2" />
  </symbol>

  <!-- Marketplace -->
  <symbol id="icon-market" viewBox="0 0 24 24">
    <polyline points="4 7 10 7 10 4" />
    <polyline points="20 17 14 17 14 20" />
    <line x1="10" y1="7" x2="20" y2="17" />
    <line x1="4" y1="7" x2="14" y2="17" />
  </symbol>

  <!-- P2P Transfer -->
  <symbol id="icon-transfer" viewBox="0 0 24 24">
    <polyline points="7 7 3 11 7 15" />
    <polyline points="17 7 21 11 17 15" />
  </symbol>

  <!-- Guide / Codex -->
  <symbol id="icon-guide" viewBox="0 0 24 24">
    <rect x="4" y="4" width="16" height="16" />
    <line x1="8" y1="8" x2="16" y2="8" />
    <line x1="8" y1="12" x2="16" y2="12" />
    <line x1="8" y1="16" x2="13" y2="16" />
  </symbol>
<!-- Wallet / Codex -->
  <symbol id="icon-wallet" viewBox="0 0 24 24">
  <rect x="3" y="7" width="18" height="12"></rect>
  <circle cx="17" cy="13" r="1.5"></circle>
</symbol>
  <!-- Withdraw / Codex -->
  <symbol id="icon-withdraw" viewBox="0 0 24 24">
  <line x1="12" y1="3" x2="12" y2="17"></line>
  <polyline points="6 11 12 17 18 11"></polyline>
</symbol>

</svg>
