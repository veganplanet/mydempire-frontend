<svg xmlns="http://www.w3.org/2000/svg" style="display:none;">

  <!-- Global -->
  <symbol id="icon-global" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9"></circle>
    <path d="M3 12h18"></path>
    <path d="M12 3a12 12 0 0 1 0 18"></path>
    <path d="M12 3a12 12 0 0 0 0 18"></path>
  </symbol>

  <!-- Treasury -->
  <symbol id="icon-treasury" viewBox="0 0 24 24">
    <rect x="4" y="7" width="16" height="12" rx="2" ry="2"></rect>
    <path d="M7 7V5h10v2"></path>
    <circle cx="16.5" cy="13" r="1.5"></circle>
  </symbol>

  <!-- Land -->
  <symbol id="icon-land" viewBox="0 0 24 24">
    <rect x="3" y="3" width="7" height="7"></rect>
    <rect x="14" y="3" width="7" height="7"></rect>
    <rect x="3" y="14" width="7" height="7"></rect>
    <rect x="14" y="14" width="7" height="7"></rect>
  </symbol>

  <!-- Blueprint -->
  <symbol id="icon-blueprint" viewBox="0 0 24 24">
