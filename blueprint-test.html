<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blueprint NFT Test</title>

<style>

/* ===== PAGE ===== */
body {
  background: #0f172a;
  display: flex;
  gap: 30px;
  padding: 40px;
  font-family: Arial;
}

/* ===== CARD BASE ===== */
.bp-card {
  width: 220px;
  height: 300px;
  border-radius: 18px;
  position: relative;
  overflow: hidden;
  background: linear-gradient(145deg, #1e293b, #0f172a);
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
.bp-inner {
  position: absolute;
  inset: 8px;
  border-radius: 14px;

  background: linear-gradient(
    180deg,
    color-mix(in srgb, var(--color) 20%, #0b1224),
    #0b1224
  );
  .bp-inner::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 80px;

  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.08),
    transparent
  );

  border-radius: 14px 14px 0 0;
}
} 
/* ===== FRAME (MAIN MAGIC) ===== */
.bp-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 18px;
  padding: 3px;

  background: linear-gradient(
    145deg,
    var(--color),
    #0f172a,
    var(--color)
  );

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}
/* ===== INNER GLOW ===== */
.bp-card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 18px;
  background: radial-gradient(circle at top, var(--color)20, transparent 60%);
  pointer-events: none;
}

/* ===== TITLE ===== */
.bp-title {
  text-align: center;
  font-weight: 600;
  padding: 14px;
  color: #e5e7eb;
  letter-spacing: 1.2px;
  font-size: 14px;
}
/* ===== ART ===== */
.bp-art {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 170px;
}

.bp-art img {
  max-width: 80%;
  max-height: 140px;
}

/* ===== BADGE ===== */
.bp-badge {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  width: 58px;
  height: 58px;
  border-radius: 50%;

 background: radial-gradient(circle at 30% 30%, #ffffff66, var(--color));
  color: #022c22;

  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;

  border: 2px solid #0f172a;
  box-shadow:
    0 0 12px var(--color),
    inset 0 2px 6px rgba(255,255,255,0.3);
}
.bp-card:hover {
  transform: translateY(-6px);
  transition: 0.2s;
}

/* ===== LEVEL COLORS ===== */
.b1 { --color: #22c55e; }   /* green */
.b2 { --color: #1565c0; }   /* blue */
.b3 { --color: #7e57c2; }   /* purple */
.b4 { --color: #ff8f00; }   /* orange */
.b5 { --color: #ffca28; }   /* gold */

</style>
</head>

<body>

<!-- B1 PHARMA -->
<div class="bp-card b1">
  <div class="bp-inner">

    <div class="bp-title">PHARMA</div>

    <div class="bp-art">
      <img src="assets/pharma-building.png">
    </div>

    <div class="bp-badge">B1</div>

  </div>
</div>
<!-- B3 FOOD -->
<div class="bp-card b3">
  <div class="bp-title">FOOD</div>
  <div class="bp-art">
    <img src="https://via.placeholder.com/120x100" />
  </div>
  <div class="bp-badge">B3</div>
</div>

<!-- B5 CHEMICAL -->
<div class="bp-card b5">
  <div class="bp-title">CHEMICAL</div>
  <div class="bp-art">
    <img src="https://via.placeholder.com/120x100" />
  </div>
  <div class="bp-badge">B5</div>
</div>

</body>
</html>
