<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MydEmpire</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0b0b0b;
  color:white;
  text-align:center;
  padding-top:100px;
}

nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:60px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:20px;
}

.login-box{
  background:#161616;
  padding:30px;
  width:320px;
  margin:auto;
  border-radius:8px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:4px;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#3a7cff;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:4px;
  cursor:pointer;
}

button:hover{
  background:#2d63cc;
}

#error{
  color:#ff5252;
  margin-top:10px;
}
</style>
</head>

<body>

<nav>
MYDEMPIRE
</nav>

<div class="login-box">

<h2>Login</h2>

<input id="username" placeholder="Hive Username">

<button onclick="login()">Enter Empire</button>

<div id="error"></div>

</div>

<script>

async function login(){

const username = document.getElementById("username").value
.trim()
.replace("@","")
.toLowerCase()

if(!username){
document.getElementById("error").innerText = "Enter username"
return
}

try{

const res = await fetch("/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username})
})

const data = await res.json()

if(!data.success){
document.getElementById("error").innerText = "Wallet not whitelisted"
return
}

localStorage.setItem("username",username)

window.location.href="/player"

}catch(e){

document.getElementById("error").innerText="Server error"

}

}

</script>

</body>
</html>
