

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MydEmpire — Pre Genesis</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #22c55e;
      color: black;
    }

    .danger {
      background: #ef4444;
      color: white;
    }

    input {
      padding: 10px;
      width: 80px;
      text-align: center;
      font-size: 16px;
    }

    .status {
      margin-top: 20px;
      min-height: 20px;
    }
  </style>
</head>
<body>

  <h1>🏛 MYDEMPIRE</h1>
  <p>PRE-GENESIS PACK SALE</p>

  <div class="card">

    <div>
      <button class="primary" onclick="connectWallet()">Connect Wallet</button>
      <p id="walletDisplay"></p>
    </div>

    <hr>

    <div>
      <p>3 HIVE per pack</p>
      <input type="number" id="packCount" value="1" min="1" max="10" />
      <br>
      <button class="primary" onclick="purchase()">Buy Packs</button>
    </div>

    <div class="status" id="status"></div>

  </div>

<script>

  const backend = "http://localhost:10000";
  let username = null;

  // 🔐 Connect Wallet
  function connectWallet() {
    if (!window.hive_keychain) {
      alert("Hive Keychain not installed.");
      return;
    }

    const user = prompt("Enter your Hive username:");
    if (!user) return;

    username = user.trim();
    document.getElementById("walletDisplay").innerText =
      "Connected: " + username;
  }

  // 💰 Purchase Flow
  async function purchase() {
    try {
      if (!username) {
        alert("Connect wallet first.");
        return;
      }

      const packs = parseInt(document.getElementById("packCount").value);

      if (packs <= 0) {
        alert("Invalid pack amount.");
        return;
      }

      document.getElementById("status").innerText = "Creating order...";

      const orderRes = await fetch(`${backend}/create-order`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, packs })
      });

      const orderData = await orderRes.json();

      if (!orderRes.ok) {
        showError(orderData.error || "Order creation failed.");
        return;
      }

      const orderId = orderData.order.id;
      const totalAmount = Number(orderData.order.hive_amount);

      document.getElementById("status").innerText =
        "Waiting for Hive transfer...";

      // ✅ CORRECT TRANSFER FORMAT
      window.hive_keychain.requestTransfer(
        username,
        "mydempiregain",
        totalAmount.toFixed(3),        // amount only
        "MydEmpire Pack Purchase",    // memo
        "HIVE",                       // currency separate
        async function(response) {

          if (!response.success) {
            showError("Transfer cancelled.");
            return;
          }

          document.getElementById("status").innerText =
            "Confirming payment...";

          const confirmRes = await fetch(`${backend}/confirm-payment`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              orderId,
              txid: response.result.id
            })
          });

          const confirmData = await confirmRes.json();

          if (!confirmRes.ok) {
            showError(confirmData.error || "Payment confirmation failed.");
            return;
          }

          document.getElementById("status").innerText =
            "✅ Purchase successful!";
        }
      );

    } catch (err) {
      showError("Unexpected error occurred.");
      console.error(err);
    }
  }

  function showError(message) {
    document.getElementById("status").innerText = "❌ " + message;
  }

</script><script src="/js/hive.js"></script>
</body>
</html>
