<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empire Assets Showcase</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="shop.css" />
</head>
<body class="page-root" style="padding:20px; background:transparent;">

  <section class="pack-showcase-slide active">
    <div class="pack-showcase-grid foundation-grid">

      <div class="asset-card-wrap">
        <div class="asset-count-badge" id="asset-land-l1">x 0</div>
        <div class="nft-card land l1">
          <div class="nft-inner">
            <div class="nft-title">FRONTIER</div>
            <div class="land-layout land-layout-1">
              <img src="assets/land-l1.png" class="land-tile" alt="L1 Frontier">
            </div>
            <div class="nft-badge">L1</div>
          </div>
        </div>
      </div>

      <div class="asset-card-wrap">
        <div class="asset-count-badge" id="asset-land-l2">x 0</div>
        <div class="nft-card land l2">
          <div class="nft-inner">
            <div class="nft-title">ESTATE</div>
            <div class="land-layout land-layout-2">
              <img src="assets/land-l2.png" class="land-tile" alt="L2 Estate">
              <img src="assets/land-l2.png" class="land-tile" alt="L2 Estate">
            </div>
            <div class="nft-badge">L2</div>
          </div>
        </div>
      </div>

      <div class="asset-card-wrap">
        <div class="asset-count-badge" id="asset-land-l3">x 0</div>
        <div class="nft-card land l3">
          <div class="nft-inner">
            <div class="nft-title">INDUSTRIAL ZONE</div>
            <div class="land-layout land-layout-3">
              <img src="assets/land-l3.png" class="land-tile land-top" alt="L3 Industrial Zone">
              <img src="assets/land-l3.png" class="land-tile land-bottom-left" alt="L3 Industrial Zone">
              <img src="assets/land-l3.png" class="land-tile land-bottom-right" alt="L3 Industrial Zone">
            </div>
            <div class="nft-badge">L3</div>
          </div>
        </div>
      </div>

      <div class="asset-card-wrap">
        <div class="asset-count-badge" id="asset-relics">x 0</div>
        <div class="nft-card relic-card shop-special-card">
          <div class="relic-art-wrap">
            <img src="assets/relic.png" alt="Founder Relic" class="relic-art-img">
          </div>
          <div class="shop-special-note rare-note">Rare Asset</div>
        </div>
      </div>

      <div class="asset-card-wrap">
        <div class="asset-count-badge" id="asset-writs">x 0</div>
        <div class="nft-card writ-card shop-special-card">
          <div class="writ-art-wrap">
            <img src="assets/writ.png" alt="Founder Writ" class="writ-art-img">
          </div>
          <div class="shop-special-note bundle-note">Founder Asset</div>
        </div>
      </div>

    </div>
  </section>

</body>
</html>
